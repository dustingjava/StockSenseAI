name: StockSense AI Daily Fetch

on:
  schedule:
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy ta boto3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Fetch and upload data
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: python fetch_and_upload.py

      - name: Trigger Lambda
        run: |
          aws lambda invoke \
            --function-name stocksense-daily-retrain \
            --region us-east-1 \
            --payload '{}' \
            --cli-binary-format raw-in-base64-out \
            response.json
          cat response.json
